<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Microphone body -->
  <rect x="216" y="100" width="80" height="160" rx="40" fill="white"/>
  <!-- Microphone arc -->
  <path d="M168 240 a88 88 0 0 0 176 0" fill="none" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <!-- Microphone stand -->
  <line x1="256" y1="328" x2="256" y2="380" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <!-- Sound waves left -->
  <path d="M120 180 a60 80 0 0 0 0 120" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.5"/>
  <path d="M80 160 a90 110 0 0 0 0 160" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.3"/>
  <!-- Sound waves right -->
  <path d="M392 180 a60 80 0 0 1 0 120" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.5"/>
  <path d="M432 160 a90 110 0 0 1 0 160" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" opacity="0.3"/>
  <!-- Text baseline hint -->
  <line x1="186" y1="420" x2="326" y2="420" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.6"/>
  <line x1="210" y1="450" x2="302" y2="450" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.35"/>
</svg>
