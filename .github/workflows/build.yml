name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  SHERPA_VERSION: "v1.12.29"

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            sherpa_archive: sherpa-onnx-v1.12.29-osx-universal2-shared-no-tts.tar.bz2
            sherpa_dir: sherpa-onnx-v1.12.29-osx-universal2-shared-no-tts
          - platform: macos-latest
            target: x86_64-apple-darwin
            sherpa_archive: sherpa-onnx-v1.12.29-osx-universal2-shared-no-tts.tar.bz2
            sherpa_dir: sherpa-onnx-v1.12.29-osx-universal2-shared-no-tts
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sherpa_archive: sherpa-onnx-v1.12.29-win-x64-shared-MD-Release-no-tts.tar.bz2
            sherpa_dir: sherpa-onnx-v1.12.29-win-x64-shared-MD-Release-no-tts

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Download sherpa-onnx libs
        shell: bash
        run: |
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/${{ env.SHERPA_VERSION }}/${{ matrix.sherpa_archive }}"
          echo "Downloading: $URL"
          curl -L --fail -o /tmp/sherpa.tar.bz2 "$URL"
          echo "Downloaded $(wc -c < /tmp/sherpa.tar.bz2) bytes"
          cd /tmp && tar xf sherpa.tar.bz2
          mkdir -p "$GITHUB_WORKSPACE/sherpa-onnx-libs/lib"
          # Copy lib/ contents
          if [ -d "/tmp/${{ matrix.sherpa_dir }}/lib" ]; then
            cp -r /tmp/${{ matrix.sherpa_dir }}/lib/* "$GITHUB_WORKSPACE/sherpa-onnx-libs/lib/"
          fi
          # Windows: DLLs may be in bin/
          if [ -d "/tmp/${{ matrix.sherpa_dir }}/bin" ]; then
            cp /tmp/${{ matrix.sherpa_dir }}/bin/*.dll "$GITHUB_WORKSPACE/sherpa-onnx-libs/lib/" 2>/dev/null || true
          fi
          echo "SHERPA_ONNX_LIB_DIR=$GITHUB_WORKSPACE/sherpa-onnx-libs/lib" >> $GITHUB_ENV
          ls -la "$GITHUB_WORKSPACE/sherpa-onnx-libs/lib/"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHERPA_ONNX_LIB_DIR: ${{ env.SHERPA_ONNX_LIB_DIR }}
        with:
          args: --target ${{ matrix.target }}

      - name: Bundle sherpa-onnx libs (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            mkdir -p "$APP_PATH/Contents/Frameworks"
            cp sherpa-onnx-libs/lib/lib*.dylib "$APP_PATH/Contents/Frameworks/"
            echo "Bundled dylibs into $APP_PATH/Contents/Frameworks/"
          fi

      - name: Bundle sherpa-onnx libs (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          EXE_DIR="src-tauri/target/${{ matrix.target }}/release"
          cp sherpa-onnx-libs/lib/*.dll "$EXE_DIR/" 2>/dev/null || true
          cp sherpa-onnx-libs/lib/*.lib "$EXE_DIR/" 2>/dev/null || true
          find src-tauri/target/${{ matrix.target }}/release/bundle -type d | while read dir; do
            cp sherpa-onnx-libs/lib/*.dll "$dir/" 2>/dev/null || true
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install npm dependencies
        run: npm ci

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Download sherpa-onnx Android libs
        shell: bash
        run: |
          ARCHIVE="sherpa-onnx-${{ env.SHERPA_VERSION }}-android.tar.bz2"
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/${{ env.SHERPA_VERSION }}/$ARCHIVE"
          echo "Downloading: $URL"
          curl -L --fail -o /tmp/sherpa-android.tar.bz2 "$URL"
          echo "Downloaded $(wc -c < /tmp/sherpa-android.tar.bz2) bytes"
          cd /tmp && tar xf sherpa-android.tar.bz2

          SHERPA_DIR="$GITHUB_WORKSPACE/sherpa-onnx-libs"
          mkdir -p "$SHERPA_DIR/lib"
          # Find arm64-v8a libs
          find /tmp -path "*/arm64-v8a/libsherpa-onnx-c-api.so" -exec cp {} "$SHERPA_DIR/lib/" \;
          find /tmp -path "*/arm64-v8a/libonnxruntime.so" -exec cp {} "$SHERPA_DIR/lib/" \;
          echo "SHERPA_ONNX_LIB_DIR=$SHERPA_DIR/lib" >> $GITHUB_ENV
          ls -la "$SHERPA_DIR/lib/"

      - name: Build Android APK
        run: npx tauri android build --apk
        env:
          SHERPA_ONNX_LIB_DIR: ${{ env.SHERPA_ONNX_LIB_DIR }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
