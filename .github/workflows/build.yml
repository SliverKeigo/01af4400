name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  SHERPA_VERSION: "v1.12.29"

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            sherpa_archive: sherpa-onnx-v1.12.29-osx-universal2-shared-no-tts.tar.bz2
            sherpa_dir: sherpa-onnx-v1.12.29-osx-universal2-shared-no-tts
          - platform: macos-latest
            target: x86_64-apple-darwin
            sherpa_archive: sherpa-onnx-v1.12.29-osx-universal2-shared-no-tts.tar.bz2
            sherpa_dir: sherpa-onnx-v1.12.29-osx-universal2-shared-no-tts
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sherpa_archive: sherpa-onnx-v1.12.29-win-x64-shared-MD-Release-no-tts.tar.bz2
            sherpa_dir: sherpa-onnx-v1.12.29-win-x64-shared-MD-Release-no-tts

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Download sherpa-onnx libs
        shell: bash
        run: |
          URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/${{ env.SHERPA_VERSION }}/${{ matrix.sherpa_archive }}"
          echo "Downloading: $URL"
          curl -L --fail -o /tmp/sherpa.tar.bz2 "$URL"
          echo "Downloaded $(wc -c < /tmp/sherpa.tar.bz2) bytes"
          cd /tmp && tar xf sherpa.tar.bz2
          mkdir -p "$GITHUB_WORKSPACE/sherpa-onnx-libs/lib"
          if [ -d "/tmp/${{ matrix.sherpa_dir }}/lib" ]; then
            cp -r /tmp/${{ matrix.sherpa_dir }}/lib/* "$GITHUB_WORKSPACE/sherpa-onnx-libs/lib/"
          fi
          if [ -d "/tmp/${{ matrix.sherpa_dir }}/bin" ]; then
            cp /tmp/${{ matrix.sherpa_dir }}/bin/*.dll "$GITHUB_WORKSPACE/sherpa-onnx-libs/lib/" 2>/dev/null || true
          fi
          echo "SHERPA_ONNX_LIB_DIR=$GITHUB_WORKSPACE/sherpa-onnx-libs/lib" >> $GITHUB_ENV
          ls -la "$GITHUB_WORKSPACE/sherpa-onnx-libs/lib/"

      # macOS: Fix dylib install names so they use @rpath
      - name: Fix dylib install names (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          LIB_DIR="$GITHUB_WORKSPACE/sherpa-onnx-libs/lib"
          cd "$LIB_DIR"
          for dylib in lib*.dylib; do
            [ -L "$dylib" ] && continue  # skip symlinks
            [ -f "$dylib" ] || continue
            echo "Fixing install name for $dylib"
            # Set the dylib's own install name to @rpath/name
            install_name_tool -id "@rpath/$dylib" "$dylib" 2>/dev/null || true
          done
          # Fix cross-references between dylibs
          for dylib in lib*.dylib; do
            [ -L "$dylib" ] && continue
            [ -f "$dylib" ] || continue
            # Find all dependencies that reference the absolute CI path and fix them
            otool -L "$dylib" | grep -v ':$' | awk '{print $1}' | while read dep; do
              dep_basename=$(basename "$dep")
              if [[ "$dep" == */sherpa-onnx-libs/lib/* ]] || [[ "$dep" == /Users/runner/* ]]; then
                echo "  Fixing dep $dep -> @rpath/$dep_basename in $dylib"
                install_name_tool -change "$dep" "@rpath/$dep_basename" "$dylib" 2>/dev/null || true
              fi
            done
          done
          echo "--- Verify install names ---"
          for dylib in lib*.dylib; do
            [ -L "$dylib" ] && continue
            [ -f "$dylib" ] || continue
            echo "=== $dylib ==="
            otool -L "$dylib" | head -5
          done

      # macOS: Inject dylib paths into tauri.conf.json frameworks
      - name: Configure Tauri frameworks (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          LIB_DIR="$GITHUB_WORKSPACE/sherpa-onnx-libs/lib"
          # Build JSON array of dylib absolute paths (non-symlink only)
          FRAMEWORKS="["
          first=true
          for dylib in "$LIB_DIR"/lib*.dylib; do
            [ -L "$dylib" ] && continue
            [ -f "$dylib" ] || continue
            if [ "$first" = true ]; then
              first=false
            else
              FRAMEWORKS+=","
            fi
            FRAMEWORKS+="\"$dylib\""
          done
          FRAMEWORKS+="]"
          echo "Frameworks: $FRAMEWORKS"
          # Update tauri.conf.json
          cd src-tauri
          python3 -c "
          import json, sys
          with open('tauri.conf.json', 'r') as f:
              conf = json.load(f)
          conf['bundle']['macOS']['frameworks'] = json.loads(sys.argv[1])
          with open('tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2, ensure_ascii=False)
          print('Updated tauri.conf.json with frameworks')
          " "$FRAMEWORKS"
          cat tauri.conf.json | python3 -c "import sys,json; d=json.load(sys.stdin); print('frameworks:', d['bundle']['macOS']['frameworks'])"

      # Windows: generate onnxruntime.lib import library from DLL
      - name: Generate onnxruntime.lib (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $libDir = "$env:GITHUB_WORKSPACE\sherpa-onnx-libs\lib"
          cd $libDir

          if (Test-Path "onnxruntime.lib") {
            Write-Host "onnxruntime.lib already exists"
            return
          }

          Write-Host "Generating onnxruntime.lib from onnxruntime.dll..."

          # Find Visual Studio installation and vcvarsall
          $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vsWhere -latest -property installationPath
          $vcvars = "$vsPath\VC\Auxiliary\Build\vcvars64.bat"

          Write-Host "Using VS at: $vsPath"

          # Run dumpbin and lib inside a VS developer command prompt
          $script = @"
          call "$vcvars" >nul 2>&1
          cd /d "$libDir"
          echo LIBRARY onnxruntime.dll > onnxruntime.def
          echo EXPORTS >> onnxruntime.def
          for /f "tokens=4" %%A in ('dumpbin /EXPORTS onnxruntime.dll ^| findstr /R "^ *[0-9][0-9]* "') do echo   %%A >> onnxruntime.def
          lib /DEF:onnxruntime.def /OUT:onnxruntime.lib /MACHINE:X64
          del onnxruntime.def onnxruntime.exp 2>nul
          "@

          $tempBat = [System.IO.Path]::GetTempFileName() + ".bat"
          Set-Content -Path $tempBat -Value $script -Encoding ASCII
          cmd /c $tempBat
          Remove-Item $tempBat -ErrorAction SilentlyContinue

          if (Test-Path "onnxruntime.lib") {
            Write-Host "onnxruntime.lib generated successfully"
          } else {
            Write-Error "Failed to generate onnxruntime.lib"
            exit 1
          }

          Get-ChildItem *.lib

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHERPA_ONNX_LIB_DIR: ${{ env.SHERPA_ONNX_LIB_DIR }}
        with:
          tagName: v__VERSION__
          releaseName: "跟读助手 v__VERSION__"
          releaseBody: "macOS 和 Windows 桌面客户端安装包"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Bundle sherpa-onnx libs (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          EXE_DIR="src-tauri/target/${{ matrix.target }}/release"
          cp sherpa-onnx-libs/lib/*.dll "$EXE_DIR/" 2>/dev/null || true
          find src-tauri/target/${{ matrix.target }}/release/bundle -type d | while read dir; do
            cp sherpa-onnx-libs/lib/*.dll "$dir/" 2>/dev/null || true
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis
